<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Imagens</title>
</head>

<body>
    <h1>Galeria de Imagens e Links</h1>

    <!-- ncora alvo para o link "volto ao tempo"
     -->
    <a id="topo"></a>
   
    <!--  codigo de símbolo -->
    <p>&#9829;</p>
    <!--  são emoji ( windos+.)-->
    <p>💕♉</p>

    <hr>

    <h2> Filmes do Tim Burton:</h2>

    <p>

        <a href="#Fruit"><img src="img/fruit.jpg"
         alt="Fruit"></a>
        
        <a herf="Mango"><img src="img/Mango.jpg" 
        alt="Mango"></a>
        
        <a herf="Mandarine"><img src="img/Mandarine.jpg"
        alt="Mandarine"></a>
    </p>

    <h2>O Fruit</h2>
    <a> id="Fruit"</a>

    <figure>
        <img src="img/fruit.jpg"
        alt="fruit">
        <figcaption>Fruit, em os Fantasmas se 
        divertem!</figcaption>
    </figure>
</body>

</html>
