<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com imagens</title>
</head>

<body>
    <h1>Trabalhando com imagens</h1>
    <p> O Uso da tag <b>IMG</b>  e os atributos <b> 
        src</b> e <b> alt</b>.</p> 


        <p>

            <img src="img/download.jpg" alt="um cachorro bonitho">
            <!-- src: caminho para o arquivo de imagemn
               alt: textoalternativo para acessibilidade e
               SEo
               obs:Recomendado evitar imagens sem alt-->
        </p>

        <figure>
            <!-- <figure> tag que agrupa a aimagem com a 
            legenda semântica-->
              
             <img src="img/miraculous.jpg" alt="imagem do miraculous">
             <!-- Legende da figura -->
             <figcaption>
                Imagen do um dos melhores casais de anime do mundo
             </figcaption>
        </figure>
    
</body>
</html>
